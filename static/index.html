<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Sentinel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --border:   #2a2a2a;
      --accent:   #6366f1;
      --accent-dim: #4f52d1;
      --text:     #e4e4e7;
      --muted:    #71717a;
      --user-bg:  #6366f1;
      --user-text:#ffffff;
      --bot-bg:   #1e1e2e;
      --pill-bg:  #27272a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* ---- header ---- */
    header {
      padding: 20px 0 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ---- portfolio pills ---- */
    #portfolio-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .pill {
      background: var(--pill-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 0.75rem;
      color: var(--text);
      white-space: nowrap;
    }

    .pill strong {
      color: var(--accent);
    }

    /* ---- messages ---- */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .msg.user  { flex-direction: row-reverse; }
    .msg.bot   { flex-direction: row; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .msg.user .avatar { background: var(--accent); color: #fff; }
    .msg.bot  .avatar { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* markdown rendering inside bot bubbles */
    .bubble b { color: #c4b5fd; }
    .bubble ul { padding-left: 18px; margin: 4px 0; }
    .bubble li { margin: 2px 0; }
    .bubble .num { color: #a5f3fc; font-variant-numeric: tabular-nums; }
    .bubble .label { color: var(--muted); font-size: 0.82em; }

    /* ---- loading dots ---- */
    .loading-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      margin: 0 2px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1;   }
    }

    /* ---- input row ---- */
    #input-row {
      display: flex;
      gap: 10px;
      padding: 14px 0 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover:not(:disabled) { background: var(--accent-dim); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ---- scrollbar ---- */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    /* ---- responsive ---- */
    @media (max-width: 600px) {
      .bubble { max-width: 88%; font-size: 0.85rem; }
      header h1 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>Portfolio <span>Sentinel</span></h1>
    <p>portfolio analytics agent</p>
  </header>

  <div id="portfolio-bar"></div>

  <div id="messages"></div>

  <div id="input-row">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Ask about performance, risk, sectors, correlations…"
    ></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  // ---------------------------------------------------------------------------
  // Config
  // ---------------------------------------------------------------------------
  const DEFAULT_TICKERS = ["AAPL", "MSFT", "NVDA", "GOOGL", "CRH"];
  const DEFAULT_WEIGHTS = [0.25, 0.20, 0.25, 0.20, 0.10];

  let conversationHistory = [];

  // ---------------------------------------------------------------------------
  // Portfolio bar
  // ---------------------------------------------------------------------------
  const bar = document.getElementById("portfolio-bar");
  DEFAULT_TICKERS.forEach((t, i) => {
    const pill = document.createElement("div");
    pill.className = "pill";
    pill.innerHTML = `<strong>${t}</strong> ${(DEFAULT_WEIGHTS[i] * 100).toFixed(0)}%`;
    bar.appendChild(pill);
  });

  // ---------------------------------------------------------------------------
  // Markdown-ish renderer (no external deps)
  // ---------------------------------------------------------------------------
  function renderMarkdown(text) {
    // Escape HTML first
    let s = text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");

    // Bold: **text**
    s = s.replace(/\*\*(.+?)\*\*/g, "<b>$1</b>");

    // Bullet lists: lines starting with "- " or "• "
    const lines = s.split("\n");
    const out = [];
    let inList = false;
    for (const line of lines) {
      if (/^[-•]\s/.test(line)) {
        if (!inList) { out.push("<ul>"); inList = true; }
        out.push("<li>" + line.replace(/^[-•]\s/, "") + "</li>");
      } else {
        if (inList) { out.push("</ul>"); inList = false; }
        out.push(line === "" ? "<br>" : line + "<br>");
      }
    }
    if (inList) out.push("</ul>");
    return out.join("\n");
  }

  // ---------------------------------------------------------------------------
  // DOM helpers
  // ---------------------------------------------------------------------------
  const messagesEl = document.getElementById("messages");

  function appendMessage(role, htmlContent) {
    const wrap = document.createElement("div");
    wrap.className = `msg ${role === "user" ? "user" : "bot"}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "You" : "PS";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = htmlContent;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function showLoadingDots() {
    const wrap = document.createElement("div");
    wrap.className = "msg bot";
    wrap.id = "loading-msg";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "PS";

    const bubble = document.createElement("div");
    bubble.className = "bubble loading-dots";
    bubble.innerHTML = "<span></span><span></span><span></span>";

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeLoadingDots() {
    const el = document.getElementById("loading-msg");
    if (el) el.remove();
  }

  // ---------------------------------------------------------------------------
  // API call
  // ---------------------------------------------------------------------------
  async function sendMessage(text, silent = false) {
    if (!silent) {
      appendMessage("user", renderMarkdown(text));
    }

    const sendBtn = document.getElementById("send-btn");
    const inputEl = document.getElementById("user-input");
    sendBtn.disabled = true;
    inputEl.disabled = true;

    showLoadingDots();

    try {
      const resp = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: text,
          tickers: DEFAULT_TICKERS,
          weights: DEFAULT_WEIGHTS,
          conversation_history: conversationHistory,
        }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || resp.statusText);
      }

      const data = await resp.json();
      conversationHistory = data.conversation_history;
      removeLoadingDots();
      appendMessage("bot", renderMarkdown(data.reply));
    } catch (err) {
      removeLoadingDots();
      appendMessage("bot", `<span style="color:#f87171">Error: ${err.message}</span>`);
    } finally {
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
    }
  }

  // ---------------------------------------------------------------------------
  // Event listeners
  // ---------------------------------------------------------------------------
  document.getElementById("send-btn").addEventListener("click", () => {
    const inputEl = document.getElementById("user-input");
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    inputEl.style.height = "auto";
    sendMessage(text);
  });

  document.getElementById("user-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      document.getElementById("send-btn").click();
    }
  });

  // Auto-resize textarea
  document.getElementById("user-input").addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
  });

  // ---------------------------------------------------------------------------
  // Initialisation: silent first message to populate the chat
  // ---------------------------------------------------------------------------
  window.addEventListener("DOMContentLoaded", () => {
    sendMessage(
      "Summarise the current portfolio performance and key risk metrics.",
      true   // silent = don't render user bubble
    );
  });
</script>
</body>
</html>
