<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Sentinel — Eval Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f0f0f;
      --surface: #1a1a1a;
      --border:  #2a2a2a;
      --accent:  #6366f1;
      --text:    #e4e4e7;
      --muted:   #71717a;
      --green:   #4ade80;
      --red:     #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      padding: 0 16px 40px;
    }

    .page { max-width: 900px; margin: 0 auto; }

    header {
      padding: 22px 0 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    header h1 { font-size: 1.2rem; font-weight: 700; color: #fff; }
    header h1 span { color: var(--accent); }
    .nav-links { display: flex; gap: 16px; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a.active { color: var(--accent); }

    h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 28px 0 12px;
    }

    /* ---- stat cards ---- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .stat-card .label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-card .value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      margin-top: 4px;
      line-height: 1.2;
    }

    /* ---- bar chart ---- */
    .bar-chart {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
    }

    .bar-label {
      width: 220px;
      flex-shrink: 0;
      font-size: 0.8rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-track {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .bar-count {
      width: 32px;
      text-align: right;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ---- table ---- */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead th {
      text-align: left;
      padding: 10px 14px;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
    tbody td { padding: 9px 14px; color: var(--text); }
    tbody tr:hover td { background: #1f1f2e; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .badge.ok      { background: #14532d; color: var(--green); }
    .badge.warning { background: #7c2d12; color: #fb923c; }

    /* ---- refresh button ---- */
    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #status { font-size: 0.78rem; color: var(--muted); margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
<div class="page">
  <header>
    <h1>Portfolio <span>Sentinel</span> — Eval Dashboard</h1>
    <nav class="nav-links">
      <a href="/">Chat</a>
      <a href="/static/eval.html" class="active">Eval</a>
      <a href="/static/benchmark.html">Benchmark</a>
    </nav>
  </header>

  <h2>Summary</h2>
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="label">Total tool calls</div><div class="value" id="total-calls">—</div></div>
    <div class="stat-card"><div class="label">Grounded rate</div><div class="value" id="grounded-rate">—</div></div>
    <div class="stat-card"><div class="label">Avg latency</div><div class="value" id="avg-latency">—</div></div>
  </div>

  <h2>Calls per tool</h2>
  <div class="bar-chart" id="bar-chart"><div style="color:var(--muted);font-size:0.85rem">Loading…</div></div>

  <h2>Recent calls <span style="color:var(--muted);font-weight:400;font-size:0.78rem">(last 20)</span></h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Tool</th>
          <th>Latency (ms)</th>
          <th>Grounded</th>
        </tr>
      </thead>
      <tbody id="log-tbody"><tr><td colspan="4" style="color:var(--muted);text-align:center">Loading…</td></tr></tbody>
    </table>
  </div>

  <div class="toolbar">
    <button id="refresh-btn">Refresh</button>
  </div>
  <div id="status"></div>
</div>

<script>
  async function load() {
    document.getElementById("refresh-btn").disabled = true;
    document.getElementById("status").textContent = "Refreshing…";

    try {
      const [summaryResp, logResp] = await Promise.all([
        fetch("/eval/summary"),
        fetch("/eval/log"),
      ]);
      const summary = await summaryResp.json();
      const log = await logResp.json();

      // --- stats ---
      document.getElementById("total-calls").textContent = summary.total_calls ?? 0;
      document.getElementById("grounded-rate").textContent =
        summary.total_calls ? (summary.grounded_rate * 100).toFixed(1) + "%" : "—";
      document.getElementById("avg-latency").textContent =
        summary.total_calls ? summary.avg_latency_ms.toFixed(0) + " ms" : "—";

      // --- bar chart ---
      const barChart = document.getElementById("bar-chart");
      const cpt = summary.calls_per_tool || {};
      const tools = Object.keys(cpt);
      if (tools.length === 0) {
        barChart.innerHTML = '<div style="color:var(--muted);font-size:0.85rem">No data yet.</div>';
      } else {
        const maxVal = Math.max(...Object.values(cpt));
        barChart.innerHTML = tools.sort().map(t => `
          <div class="bar-row">
            <span class="bar-label">${t}</span>
            <div class="bar-track"><div class="bar-fill" style="width:${maxVal > 0 ? (cpt[t]/maxVal*100).toFixed(1) : 0}%"></div></div>
            <span class="bar-count">${cpt[t]}</span>
          </div>`).join("");
      }

      // --- log table (last 20) ---
      const tbody = document.getElementById("log-tbody");
      const recent = log.slice(-20).reverse();
      if (recent.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted);text-align:center">No entries yet.</td></tr>';
      } else {
        tbody.innerHTML = recent.map(e => {
          const ts = e.timestamp ? e.timestamp.replace("T", " ").slice(0, 19) : "—";
          const grounded = e.grounded !== false;
          return `<tr>
            <td>${ts}</td>
            <td>${e.tool_name || "—"}</td>
            <td>${typeof e.latency_ms === "number" ? e.latency_ms.toFixed(1) : "—"}</td>
            <td><span class="badge ${grounded ? "ok" : "warning"}">${grounded ? "yes" : "no"}</span></td>
          </tr>`;
        }).join("");
      }

      document.getElementById("status").textContent = "Last refreshed: " + new Date().toLocaleTimeString();
    } catch (err) {
      document.getElementById("status").textContent = "Error: " + err.message;
    } finally {
      document.getElementById("refresh-btn").disabled = false;
    }
  }

  document.getElementById("refresh-btn").addEventListener("click", load);
  load();
</script>
</body>
</html>
